<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Map</title>
  <style>
    :root {
      --road-edge: #6e7278;
      --road-core: #44484d;
      --lane-mark: #f7f1a8;
      --shoulder: #8b9096;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #f6f7f9;
      position: relative;
    }

    .scene {
      position: relative;
      min-height: 2200px;
      padding: 80px 0;
      isolation: isolate;
    }

    .road {
      position: absolute;
      top: 40px;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: min(96px, 11vw);
      background:
        linear-gradient(90deg, var(--road-edge) 0 4%, var(--shoulder) 4% 9%, var(--road-core) 9% 91%, var(--shoulder) 91% 96%, var(--road-edge) 96% 100%);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.08),
        inset 18px 0 30px rgba(255, 255, 255, 0.06),
        inset -18px 0 30px rgba(0, 0, 0, 0.08);
    }

    .road::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      background:
        repeating-linear-gradient(
          180deg,
          var(--lane-mark) 0 42px,
          transparent 42px 78px
        );
      filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.12));
    }

    .road::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 10%, transparent 90%, rgba(0, 0, 0, 0.08)),
        repeating-linear-gradient(
          180deg,
          transparent 0 120px,
          rgba(255, 255, 255, 0.025) 120px 124px,
          transparent 124px 240px
        );
      pointer-events: none;
    }

    .stages {
      position: relative;
      z-index: 2;
      min-height: 2040px;
    }

    .stage {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 74px;
      height: 74px;
      border-radius: 50%;
      border: 4px solid #f8fafc;
      background: linear-gradient(180deg, #d8dde3, #b9c1ca);
      color: #48525c;
      display: grid;
      place-items: center;
      font-size: 1.45rem;
      font-weight: 700;
      box-shadow:
        0 16px 28px rgba(0, 0, 0, 0.18),
        inset 0 3px 10px rgba(255, 255, 255, 0.18);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .stage:hover,
    .stage:focus-visible {
      transform: translateX(-50%) scale(1.05);
      box-shadow:
        0 18px 30px rgba(0, 0, 0, 0.2),
        inset 0 3px 10px rgba(255, 255, 255, 0.18);
      outline: none;
    }

    .stage.active {
      background: linear-gradient(180deg, #eef2f6, #c8d0d8);
      color: #26323d;
    }

    .label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 252, 241, 0.92);
      border: 2px solid rgba(119, 103, 67, 0.2);
      color: #5d4b22;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .start {
      top: 0;
    }

    .end {
      bottom: 0;
    }

    .bubble-stack {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .stage-bubble-wrap {
      position: absolute;
      pointer-events: none;
    }

    .stage-bubble {
      position: relative;
      width: min(980px, calc(50vw - 130px));
      min-width: 420px;
      border-radius: 28px;
      padding: 22px 24px 18px;
      background: rgba(255, 253, 247, 0.97);
      border: 1px solid rgba(112, 96, 65, 0.16);
      box-shadow: 0 22px 40px rgba(0, 0, 0, 0.12);
      pointer-events: auto;
    }

    .bubble-connector {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 100%;
      width: var(--connector-length, 32px);
      border-top: 3px solid rgba(102, 111, 120, 0.55);
    }

    .bubble-node {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: calc(100% + var(--connector-length, 32px) - 10px);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(102, 111, 120, 0.8);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.7);
    }

    .stage-bubble h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      color: #26323d;
    }

    .stage-bubble p {
      margin: 0 0 10px;
      color: #38434d;
      line-height: 1.45;
    }

    .stage-bubble ul {
      margin: 0;
      padding-left: 20px;
      color: #38434d;
      line-height: 1.45;
    }

    .stage-bubble li + li {
      margin-top: 6px;
    }

    .bubble-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bubble-badges {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .bubble-number {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #d6dde4;
      color: #33404b;
      font-weight: 700;
    }

    .close-bubble {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: #eef2f5;
      color: #52616d;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .close-bubble:hover,
    .close-bubble:focus-visible {
      background: #dde5ec;
      outline: none;
    }

    @media (max-width: 1100px) {
      .bubble-stack {
        position: relative;
        height: auto;
        padding: 0 20px 30px;
      }

      .stage-bubble-wrap {
        position: relative;
        margin-bottom: 18px;
        left: auto !important;
        top: auto !important;
      }

      .stage-bubble {
        width: 100%;
        min-width: 0;
      }

      .bubble-connector,
      .bubble-node {
        display: none;
      }

    }
  </style>
</head>
<body>
  <main class="scene">
    <div class="bubble-stack" id="bubbleStack" aria-label="Open stage bubbles"></div>
    <div class="road" aria-label="Vertical roadmap spine"></div>
    <section class="stages" aria-label="Roadmap stages">
      <div class="label start">Start</div>
      <button class="stage" style="top: 140px;" data-stage="1" type="button">1</button>
      <button class="stage" style="top: 320px;" data-stage="2" type="button">2</button>
      <button class="stage" style="top: 500px;" data-stage="3" type="button">3</button>
      <button class="stage" style="top: 680px;" data-stage="4" type="button">4</button>
      <button class="stage" style="top: 860px;" data-stage="5" type="button">5</button>
      <button class="stage" style="top: 1040px;" data-stage="6" type="button">6</button>
      <button class="stage" style="top: 1220px;" data-stage="7" type="button">7</button>
      <button class="stage" style="top: 1400px;" data-stage="8" type="button">8</button>
      <button class="stage" style="top: 1580px;" data-stage="9" type="button">9</button>
      <button class="stage" style="top: 1760px;" data-stage="10" type="button">10</button>
      <div class="label end">End</div>
    </section>
  </main>
  <script>
    const stageData = {
      1: {
        status: "Missing",
        title: "Part 1 — Title Page",
        text: "Target: about half a page. This stage defines the front matter for the report and mainly needs final wording choices.",
        bullets: [
          "Include project title, author, supervisor, institution or department, course, and semester.",
          "Feeds from none and can be built directly.",
          "Still needed: final title decision and exact institution or department wording."
        ]
      },
      2: {
        status: "Optional / Skip",
        title: "Part 2 — Table of Contents",
        text: "This stage is optional because the assignment allows it to be omitted unless the final report grows beyond roughly 15 pages.",
        bullets: [
          "Skip unless the final PDF becomes long enough to justify navigation support."
        ]
      },
      3: {
        status: "Partial",
        title: "Part 3 — Introduction",
        text: "Target: about 1.5 to 2 pages. The introduction is already conceptually strong but still needs one committed prose version.",
        bullets: [
          "Covers topic and audience, business background, problem statement, research question, and significance.",
          "Feeds from introduction.md.",
          "Still needed: strip exploratory iterations and polish the chosen framing."
        ]
      },
      4: {
        status: "Partial",
        title: "Part 4 — Literature Review",
        text: "Target: about 3 to 4 pages. This part is already carefully organized around themes instead of source-by-source summaries.",
        bullets: [
          "Themes include BI infrastructure, dashboards as expertise artifacts, tacit versus explicit knowledge, migration, and AI-assisted extraction.",
          "Feeds from the 10 lit-note markdown files.",
          "Still needed: 2 to 5 more sources, thematic synthesis prose, and explicit comparison plus gap language."
        ]
      },
      5: {
        status: "Partial",
        title: "Part 5 — Data Selection, Research Design, and Methods",
        text: "Target: about 2 to 3 pages. The method is defined as a case-study approach using AI-assisted discovery on sampled Tableau workbooks.",
        bullets: [
          "Includes strategy, data sources, analytical techniques, AI role, and evaluation criteria for knowledge preservation.",
          "Feeds from solutions.md and introduction.md.",
          "Still needed: final sample list, evaluation-criteria prose, confidentiality caveats, and the written methods section."
        ]
      },
      6: {
        status: "Partial",
        title: "Part 6 — Analysis Work",
        text: "Target: about 3 to 4 pages. This stage focuses on workbook-level results, cross-case patterns, and labor or complexity analysis.",
        bullets: [
          "Needs per-workbook discovery results, cross-case comparison, and examples or figures.",
          "Feeds mainly from solutions.md and one existing workbook example.",
          "Still needed: 2 to 4 more workbooks, at least one table and one figure, and support for the 4-to-8-week rebuild estimate."
        ]
      },
      7: {
        status: "Missing",
        title: "Part 7 — Discussion, Ethics, Privacy, and AI Disclosure",
        text: "Target: about 2 to 3 pages. This is a major grading area and is identified in the outline as load-bearing.",
        bullets: [
          "Covers interpretation of findings, limitations, business implications, security, privacy, ethics, and AI-use disclosure.",
          "Feeds from none directly yet.",
          "Still needed: full draft, likely starting with a separate ethics.md scratch file."
        ]
      },
      8: {
        status: "Missing",
        title: "Part 8 — Conclusions and Closing Thoughts",
        text: "Target: about 1 page. This part should summarize the findings and frame the contribution and future work.",
        bullets: [
          "Includes summary, contribution, lessons learned, and future work.",
          "Feeds from later stages after analysis and discussion are written.",
          "Still needed: full draft."
        ]
      },
      9: {
        status: "Missing",
        title: "Part 9 — Appendix",
        text: "This supporting stage gathers the project schedule, hours log, references, sanitized discovery example, figures, and any code links.",
        bullets: [
          "Feeds from citations in the lit notes and examples in solutions.md.",
          "Still needed: schedule document, hours log, and consolidated references."
        ]
      },
      10: {
        status: "Missing",
        title: "Part 10 — Three-Minute Thesis",
        text: "This stage packages the project into a short spoken presentation with one static slide.",
        bullets: [
          "Requires a script, one slide, a talk arc, and the final recording format.",
          "Feeds from introduction.md and solutions.md.",
          "Still needed: script draft, slide design, and recording."
        ]
      }
    };

    const buttons = document.querySelectorAll(".stage");
    const bubbleStack = document.getElementById("bubbleStack");
    const openStages = new Set();

    function updateButtonState(stageNumber, isActive) {
      const button = document.querySelector(`.stage[data-stage="${stageNumber}"]`);
      if (button) {
        button.classList.toggle("active", isActive);
      }
    }

    function placeBubble(stageNumber, wrap) {
      const button = document.querySelector(`.stage[data-stage="${stageNumber}"]`);
      if (!button || window.innerWidth <= 1100) return;

      const buttonRect = button.getBoundingClientRect();
      const sceneRect = document.querySelector(".scene").getBoundingClientRect();
      const bubble = wrap.querySelector(".stage-bubble");
      const bubbleWidth = bubble.offsetWidth;
      const buttonCenterX = buttonRect.left + (buttonRect.width / 2);
      const buttonCenterY = buttonRect.top + (buttonRect.height / 2);
      const sceneY = buttonCenterY - sceneRect.top;
      const gap = 28;
      const left = Math.max(0, buttonCenterX - bubbleWidth - gap - sceneRect.left);
      const top = Math.max(24, sceneY - (bubble.offsetHeight / 2));
      const connectorLength = Math.max(24, buttonCenterX - (sceneRect.left + left + bubbleWidth));

      wrap.style.left = `${left}px`;
      wrap.style.top = `${top}px`;
      wrap.style.setProperty("--connector-length", `${connectorLength}px`);
    }

    function buildBubble(stageNumber) {
      const stage = stageData[stageNumber];
      const button = document.querySelector(`.stage[data-stage="${stageNumber}"]`);
      if (!stage || !button) return;

      const wrap = document.createElement("article");
      wrap.className = "stage-bubble-wrap";
      wrap.dataset.stageBubble = stageNumber;

      const listItems = stage.bullets
        .map((bullet) => `<li>${bullet}</li>`)
        .join("");

      wrap.innerHTML = `
        <div class="stage-bubble">
          <div class="bubble-head">
            <div class="bubble-badges">
              <div class="bubble-number">${stageNumber}</div>
              <div class="status">${stage.status}</div>
            </div>
            <button class="close-bubble" type="button" data-close-stage="${stageNumber}">Close</button>
          </div>
          <h2>${stage.title}</h2>
          <p>${stage.text}</p>
          <ul>${listItems}</ul>
          <div class="bubble-connector" aria-hidden="true"></div>
          <div class="bubble-node" aria-hidden="true"></div>
        </div>
      `;

      bubbleStack.appendChild(wrap);
      placeBubble(stageNumber, wrap);
      openStages.add(String(stageNumber));
      updateButtonState(stageNumber, true);
    }

    function closeBubble(stageNumber) {
      const bubble = document.querySelector(`[data-stage-bubble="${stageNumber}"]`);
      if (bubble) {
        bubble.remove();
      }
      openStages.delete(String(stageNumber));
      updateButtonState(stageNumber, false);
    }

    function toggleStage(stageNumber) {
      if (openStages.has(String(stageNumber))) {
        closeBubble(stageNumber);
      } else {
        buildBubble(stageNumber);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => toggleStage(button.dataset.stage));
    });

    bubbleStack.addEventListener("click", (event) => {
      const closeButton = event.target.closest("[data-close-stage]");
      if (!closeButton) return;
      closeBubble(closeButton.dataset.closeStage);
    });

    window.addEventListener("resize", () => {
      openStages.forEach((stageNumber) => {
        const bubble = document.querySelector(`[data-stage-bubble="${stageNumber}"]`);
        if (!bubble) return;
        placeBubble(stageNumber, bubble);
      });
    });
  </script>
</body>
</html>
